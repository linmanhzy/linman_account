name: CD 部署

# ============================================================
# 这是 CD（持续交付）工作流 —— 手动的
# 作用：确认代码无误后，手动触发 → 打包 → 构建 Docker 镜像 →
#       推送到镜像仓库 → SSH 登录服务器拉取并重启容器。
# 关键点：on 里只有 workflow_dispatch，意味着它"不会因 push 自动跑"，
#        必须在 GitHub 网页上点 "Run workflow" 才会执行。
#        这正是 CI 自动 / CD 手动 的分界线。
# ============================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: "要部署的版本号（如 v1.2.0）"
        required: true
        default: "v1.0.0"
      server_api_base:
        description: "APK 连接的后端地址（公网可访问）。用域名时改成 https://你的域名"
        required: false
        default: "http://47.104.152.25:8080"

# 权限：向 GitHub 容器仓库 ghcr.io 推送镜像需要写 packages 权限；
#       发布 APK 到 GitHub Release 需要写 contents 权限。
permissions:
  contents: write
  packages: write

jobs:
  deploy:
    name: 构建镜像并部署
    runs-on: ubuntu-latest
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"          # 与 pom.xml 保持一致
          cache: maven

      - name: 打包后端（生成可执行 jar，跳过测试以加快发布）
        run: mvn -B package -DskipTests
        working-directory: backend    # jar 会生成在 backend/target/ 下

      - name: 设置 Node.js（前端构建用）
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 登录 GitHub 容器仓库 (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送后端 Docker 镜像
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/account-book
          docker build -t "$IMAGE:${{ github.event.inputs.version }}" -f backend/Dockerfile backend/
          docker tag  "$IMAGE:${{ github.event.inputs.version }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ github.event.inputs.version }}"
          docker push "$IMAGE:latest"

      - name: 构建并推送前端 Docker 镜像
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/account-book-frontend
          docker build -t "$IMAGE:${{ github.event.inputs.version }}" -f frontend/Dockerfile frontend/
          docker tag  "$IMAGE:${{ github.event.inputs.version }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ github.event.inputs.version }}"
          docker push "$IMAGE:latest"

      - name: 同步 compose 文件到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.host_ip }}
          username: ${{ secrets.host_username }}
          key: ${{ secrets.my_siyao }}
          source: docker-compose.yml
          target: /opt/account_book/

      - name: SSH 登录服务器执行部署
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.host_ip }}         # 服务器 IP 或域名
          username: ${{ secrets.host_username }}  # 服务器 SSH 登录用户名
          key: ${{ secrets.my_siyao }}          # 服务器 SSH 私钥
          # ghcr.io 在国内拉取较慢，首次部署大镜像容易超过默认 10 分钟超时，放宽到 30 分钟
          command_timeout: 30m
          script: |
            cd /opt/account_book

            # 更新镜像版本号到 .env，让 compose 拉取正确版本
            sed -i "s/^APP_VERSION=.*/APP_VERSION=${{ github.event.inputs.version }}/" .env

            # 只拉取 compose 实际引用的镜像（后端 + 前端，按 APP_VERSION 指定版本）。
            # 不再额外拉取 :latest（compose 不使用），下载量减半，避免 SSH 命令超时。
            docker compose --env-file .env pull

            # 重启所有新镜像容器（包括 db，已运行则跳过；确保 backend 的 depends_on: db healthy 不被阻塞）
            docker compose --env-file .env up -d db backend nginx || true

            # 调试：显示当前所有容器状态
            echo "========== 容器列表 =========="
            docker ps -a
            echo "========== Compose 服务状态 =========="
            docker compose --env-file .env ps
            echo "=================================="

            # 等待容器健康状态就绪（最多等 180 秒）
            echo "[CD] 等待服务健康就绪..."
            for i in $(seq 1 36); do
              STATUS=$(docker inspect account-book-backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "[CD] 后端已健康就绪"
                break
              fi
              echo "[CD] 等待中... ($i/36) 当前状态: $STATUS"
              sleep 5
            done
            if [ "$STATUS" != "healthy" ]; then
              echo "[CD] 错误: 后端健康检查超时！查看日志:"
              docker logs --tail 50 account-book-backend 2>&1 || true
              echo "[CD] db 日志:"
              docker logs --tail 30 account-book-db 2>&1 || true
              exit 1
            fi

            # 清理本项目旧镜像
            docker images ghcr.io/${{ github.repository }}/account-book \
              --filter "before=ghcr.io/${{ github.repository }}/account-book:${{ github.event.inputs.version }}" \
              -q | xargs -r docker rmi || true
            docker images ghcr.io/${{ github.repository }}/account-book-frontend \
              --filter "before=ghcr.io/${{ github.repository }}/account-book-frontend:${{ github.event.inputs.version }}" \
              -q | xargs -r docker rmi || true

  # ============================================================
  # 任务二：构建安卓 APK → 发布到 GitHub Release（联网版，自动签名）
  # 与 deploy 并行执行，两者都跑完即完成「部署 + 安装包更新」。
  # ============================================================
  build-apk:
    name: 构建安卓 APK 并发布
    runs-on: ubuntu-latest
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17（Android Gradle 构建需要）
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Rust 及安卓编译目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: 缓存 Rust 依赖（加速编译）
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 SDK 组件（覆盖常见 compileSdk 版本，避免缺组件报错）
        run: |
          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-34" "platforms;android-35" "platforms;android-36" \
            "build-tools;34.0.0" "build-tools;35.0.0" "build-tools;36.0.0"

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 构建 APK（注入签名 + 公网地址 + 版本号）
        working-directory: frontend
        env:
          APP_VERSION: ${{ github.event.inputs.version }}
          VITE_API_BASE: ${{ github.event.inputs.server_api_base }}
          ANDROID_KEY_BASE64:  ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS:   ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash build_android.sh

      - name: 整理 APK 产物
        working-directory: frontend
        run: |
          mkdir -p apk-out
          find src-tauri/gen/android/app/build/outputs/apk \
            -name 'app-*-release.apk' -exec cp {} apk-out/ \;
          echo "===== 生成的 APK ====="
          ls -lh apk-out

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: 林蛮记账 ${{ github.event.inputs.version }}
          body: |
            ## 林蛮记账 安卓安装包

            - **arm64-v8a**（绝大多数现代手机，推荐）：`app-arm64-v8a-release.apk`
            - **armeabi-v7a**（较老 32 位手机）：`app-armeabi-v7a-release.apk`
            - **x86_64 / x86**（模拟器）：`app-x86_64-release.apk` / `app-x86-release.apk`

            > 安装后 App 自动连接服务器后端，无需任何配置。
          files: frontend/apk-out/*.apk
          fail_on_unmatched_files: true
