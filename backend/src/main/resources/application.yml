server:
  port: 8080

spring:
  datasource:
    # 开发期连接本机 MySQL（端口 3306），库名 linman_account
    url: jdbc:mysql://127.0.0.1:3306/linman_account?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    # 密码优先读环境变量 DB_PASSWORD，未设置时回退到本地开发默认值
    password: ${DB_PASSWORD:WXChen5437@}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    # 表结构由 schema.sql 负责创建，这里不自动改表，避免和脚本冲突
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  # 启动时自动执行建表脚本（幂等：IF NOT EXISTS）
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  # §3: 统一 JSON 序列化时区为 Asia/Shanghai，避免服务器默认 UTC 导致时间差 8 小时
  jackson:
    time-zone: Asia/Shanghai

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# M1 登录鉴权配置
myapp:
  # 系统版本号，前端通过 /api/version 读取后渲染在侧栏 Logo 右下角
  version: "1.0.3"
  jwt:
    # 生产环境请通过环境变量 JWT_SECRET 设置为足够长的随机字符串
    secret: ${JWT_SECRET:change-me-in-production-please-use-long-random-string}
    expiration-ms: 86400000   # token 有效期：24 小时
  admin:
    # 启动时会自动创建该默认管理员（若不存在）。生产环境请务必修改密码
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123456}
  # CORS 允许的前端来源，逗号分隔（生产部署时需改为实际域名）
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}
