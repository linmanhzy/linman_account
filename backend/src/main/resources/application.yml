server:
  port: 8080

spring:
  datasource:
    # 开发期连接本机 MySQL（端口 3306），库名 linman_account
    url: jdbc:mysql://127.0.0.1:3306/linman_account?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    # 密码优先读环境变量 DB_PASSWORD，未设置时回退到本地开发默认值
    password: ${DB_PASSWORD:WXChen5437@}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    # 表结构由 schema.sql 负责创建，这里不自动改表，避免和脚本冲突
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  # 启动时自动执行建表脚本（幂等：IF NOT EXISTS）
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# 预留给 M1（登录鉴权）使用的 JWT 配置
myapp:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-please-use-long-random-string}
    expiration-ms: 86400000
